name: Benchmark

on:
    pull_request: null
    push:
        branches:
            - main
    schedule:
        # every 12 hours
        - cron: '0 */12 * * *'

jobs:
    nikic-php-parser:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.4
                  coverage: none

            - run: composer install --no-progress --working-dir=nikic-PHP-Parser

            - name: Clone + install Laravel corpus
              run: |
                  git clone --depth 1 https://github.com/laravel/framework laravel
                  composer install --no-interaction --no-progress --ignore-platform-reqs --working-dir=laravel
                  # drop intentionally-broken PHP fixtures that crash some parsers
                  rm -rf laravel/tests
                  find laravel/vendor -depth -type d -name tests -exec rm -rf {} +

            - name: Run benchmark (timed)
              working-directory: nikic-PHP-Parser
              run: |
                  total=0
                  for i in $(seq 1 10); do
                    start=$(date +%s%3N)
                    make run > /dev/null
                    end=$(date +%s%3N)
                    total=$((total + end - start))
                    echo "run $i: $((end - start)) ms"
                  done
                  echo "nikic/php-parser (v5)|$((total / 10))" > ../nikic-php-parser.txt

            - uses: actions/upload-artifact@v4
              with:
                  name: duration-nikic-php-parser
                  path: nikic-php-parser.txt

    ext-ast:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.4
                  extensions: ast
                  coverage: none

            - name: Clone + install Laravel corpus
              run: |
                  git clone --depth 1 https://github.com/laravel/framework laravel
                  composer install --no-interaction --no-progress --ignore-platform-reqs --working-dir=laravel
                  # drop intentionally-broken PHP fixtures that crash some parsers
                  rm -rf laravel/tests
                  find laravel/vendor -depth -type d -name tests -exec rm -rf {} +

            - name: Run benchmark (timed)
              working-directory: ext-ast
              run: |
                  total=0
                  for i in $(seq 1 10); do
                    start=$(date +%s%3N)
                    make run > /dev/null
                    end=$(date +%s%3N)
                    total=$((total + end - start))
                    echo "run $i: $((end - start)) ms"
                  done
                  echo "ext-ast|$((total / 10))" > ../ext-ast.txt

            - uses: actions/upload-artifact@v4
              with:
                  name: duration-ext-ast
                  path: ext-ast.txt

    z7zmey-php-parser-dev:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: stable

            - name: Clone + install Laravel corpus
              run: |
                  git clone --depth 1 https://github.com/laravel/framework laravel
                  composer install --no-interaction --no-progress --ignore-platform-reqs --working-dir=laravel
                  # drop intentionally-broken PHP fixtures that crash some parsers
                  rm -rf laravel/tests
                  find laravel/vendor -depth -type d -name tests -exec rm -rf {} +

            - run: go build -o z7zmey-php-parser-dev .
              working-directory: z7zmey-php-parser-dev

            - name: Run benchmark (timed)
              working-directory: z7zmey-php-parser-dev
              run: |
                  total=0
                  for i in $(seq 1 10); do
                    start=$(date +%s%3N)
                    make run > /dev/null
                    end=$(date +%s%3N)
                    total=$((total + end - start))
                    echo "run $i: $((end - start)) ms"
                  done
                  echo "z7zmey/php-parser|$((total / 10))" > ../z7zmey-php-parser-dev.txt

            - uses: actions/upload-artifact@v4
              with:
                  name: duration-z7zmey-php-parser-dev
                  path: z7zmey-php-parser-dev.txt

    halleck45-go-php-parser:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: stable

            - name: Install musl toolchain
              run: sudo apt-get update && sudo apt-get install -y musl-tools

            - name: Clone + install Laravel corpus
              run: |
                  git clone --depth 1 https://github.com/laravel/framework laravel
                  composer install --no-interaction --no-progress --ignore-platform-reqs --working-dir=laravel
                  # drop intentionally-broken PHP fixtures that crash some parsers
                  rm -rf laravel/tests
                  find laravel/vendor -depth -type d -name tests -exec rm -rf {} +

            # The module ships no prebuilt native libs; fetch the musl build-time
            # artifacts (libphp.a, libastbridge.a, PHP embed headers) into the
            # local module copy referenced by the relative `replace` in go.mod.
            - name: Prepare go-php-parser native libs
              working-directory: halleck45-go-php-parser
              run: |
                  rm -rf .halleck-src
                  git clone --depth 1 https://github.com/Halleck45/go-php-parser .halleck-src
                  curl -sL -o musl.tgz https://github.com/Halleck45/go-php-parser/releases/download/v0.1.0/prebuilt-linux_amd64_musl.tar.gz
                  tar xzf musl.tgz -C .halleck-src
                  rm musl.tgz

            - name: Build
              working-directory: halleck45-go-php-parser
              run: |
                  INC="$(pwd)/.halleck-src/prebuilt/linux_amd64_musl/include/php"
                  GOFLAGS=-mod=mod CC=musl-gcc CGO_ENABLED=1 \
                    CGO_CFLAGS="-I$INC -I$INC/main -I$INC/Zend -I$INC/TSRM -I$INC/sapi/embed -I$INC/ext -I$INC/ext/date/lib" \
                    go build -tags musl -o halleck45-go-php-parser .

            - name: Run benchmark (timed)
              working-directory: halleck45-go-php-parser
              run: |
                  # warm-up: fetch runtime libs into v1/prebuilt (cached for later runs)
                  ./halleck45-go-php-parser ../laravel > /dev/null
                  total=0
                  for i in $(seq 1 10); do
                    start=$(date +%s%3N)
                    make run > /dev/null
                    end=$(date +%s%3N)
                    total=$((total + end - start))
                    echo "run $i: $((end - start)) ms"
                  done
                  echo "halleck45/go-php-parser|$((total / 10))" > ../halleck45-go-php-parser.txt

            - uses: actions/upload-artifact@v4
              with:
                  name: duration-halleck45-go-php-parser
                  path: halleck45-go-php-parser.txt

    mago-syntax:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable

            - name: Clone Laravel corpus
              run: git clone --depth 1 https://github.com/laravel/framework laravel

            - name: Build
              working-directory: mago-syntax
              run: cargo build --release

            - name: Run benchmark (timed)
              working-directory: mago-syntax
              run: |
                  ./target/release/mago-syntax-bench parallel ../laravel/src > /dev/null

                  total=0
                  for i in $(seq 1 10); do
                    start=$(date +%s%3N)
                    make run > /dev/null
                    end=$(date +%s%3N)
                    total=$((total + end - start))
                    echo "parallel run $i: $((end - start)) ms"
                  done
                  echo "mago-syntax (parallel)|$((total / 10))" > ../mago-syntax-parallel.txt

                  total=0
                  for i in $(seq 1 10); do
                    start=$(date +%s%3N)
                    make run-single > /dev/null
                    end=$(date +%s%3N)
                    total=$((total + end - start))
                    echo "single run $i: $((end - start)) ms"
                  done
                  echo "mago-syntax (single-threaded)|$((total / 10))" > ../mago-syntax-single.txt

            - uses: actions/upload-artifact@v4
              with:
                  name: duration-mago-syntax
                  path: |
                      mago-syntax-parallel.txt
                      mago-syntax-single.txt

    summary:
        runs-on: ubuntu-latest
        needs:
            - nikic-php-parser
            - ext-ast
            - z7zmey-php-parser-dev
            - halleck45-go-php-parser
            - mago-syntax
        steps:
            - uses: actions/download-artifact@v4
              with:
                  pattern: duration-*
                  merge-multiple: true
                  path: durations

            - name: Render comparison table
              run: |
                  data=$(find durations -name '*.txt' -exec cat {} +)
                  max=$(printf '%s\n' "$data" | sort -t'|' -k2 -nr | head -1 | cut -d'|' -f2)
                  {
                    echo "## Benchmark results"
                    echo ""
                    echo "Average wall-clock time over 10 runs parsing the full Laravel framework corpus (\`src/\` + all Composer \`vendor/\` dependencies). Slowest first; \"vs slowest\" is how many times faster than the slowest parser."
                    echo ""
                    echo '```'
                    {
                      printf 'Rank|Parser|Avg (10 runs)|vs slowest\n'
                      rank=0
                      printf '%s\n' "$data" | sort -t'|' -k2 -nr | while IFS='|' read -r name ms; do
                        rank=$((rank + 1))
                        ratio=$(awk -v m="$max" -v x="$ms" 'BEGIN{printf "%.1fx", m/x}')
                        printf '%s|%s|%s ms|%s\n' "$rank" "$name" "$ms" "$ratio"
                      done
                    } | column -t -s'|' -o ' | ' -R 1,3,4
                    echo '```'
                  } | tee -a "$GITHUB_STEP_SUMMARY"
